name: Release E-Bill package

# Trigger the workflow manually
on:
    push:
        branches:
            - feature/wizard
#   workflow_dispatch:
#     inputs:
#       version:
#         description: 'Version number for the release'
#         required: true
#       release_notes:
#         description: 'Release notes for the version'
#         required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout BE repo
        uses: actions/checkout@v4
        with:
            path: be
        
      - name: Checkout FE repo
        uses: actions/checkout@v4
        with:
            repository: BitcreditProtocol/E-Bill-frontend
            path: fe

      - name: Build FE
        run: |
            npm install
            npm run build
        working-directory: ./fe

      # Build BE
      - name: Install BE dependencies
        run: |
            sudo apt-get install -y protobuf-compiler

      - name: Build BE
        run: cargo build --features embedded-db --release
        working-directory: ./be

      # Build and release the package     
      - name: Install InstallBuilder
        run: |
            curl -L -o installbuilder-pro-24.11.1-x64.run https://releases.installbuilder.com/installbuilder/installbuilder-professional-24.11.1-linux-x64-installer.run
            chmod +x installbuilder-pro-24.11.1-x64.run
            ./installbuilder-pro-24.11.1-x64.run --mode unattended
        working-directory: ./be/.github/workflows/wizard

      - name: Build installer
        run: |
            /home/runner/installbuilder-24.11.1/bin/builder build spec.xml windows
        working-directory: ./be/.github/workflows/wizard

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
            name: bitcredit-0.3-windows-installer.exe
            path: ./be/.github/workflows/wizard/bitcredit-0.3-windows-installer.exe


        #path/to/installbuilder/bin/builder build project.xml windows