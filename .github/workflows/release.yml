name: Release E-Bill package

# Trigger the workflow manually
on:
  push:
    branches:
      - feature/wizard
#   workflow_dispatch:
#     inputs:
#       version:
#         description: 'Version number for the release'
#         required: true
#       release_notes:
#         description: 'Release notes for the version'
#         required: true

jobs:
  build:
    strategy:
      matrix:
        config: 
          - os: windows-latest
            pck: choco install protoc -y
            installer: 
                ver: windows-x64-installer.exe
                target: windows
                exec: c:/Program Files/InstallBuilder Professional 24.11.1/bin/builder-cli.exe
        #   - os: macos-latest
        #     pck: brew install protobuf
        #     installer: 
        #         ver: osx-installer.dmg
        #         target: osx
        #         exec: builder
    
    runs-on: ${{ matrix.config.os }}
    steps:
      - name: Checkout BE repo
        uses: actions/checkout@v4
        with:
            path: be
    
      - name: Install BE dependencies
        run: ${{ matrix.config.pck }}

      # - name: Build BE
      #   run: cargo build --features embedded-db --release
      #   working-directory: ./be

      # - name: Create Logs folder
      #   run: mkdir logs
      #   working-directory: ./be/target/release
      
      - name: Checkout FE repo
        uses: actions/checkout@v4
        with:
            repository: BitcreditProtocol/E-Bill-frontend
            ref: fixes/api-integration
            path: fe
          
      - name: Build FE
        run: |
            npm install
            npm run build
        working-directory: ./fe
      
      - name: Show all environment variables
        run: |
          echo '${{ toJSON(github) }}'
          echo '${{ toJSON(runner) }}'

      - name: Set work directory
        uses: richardrigutins/replace-in-files@v2
        with:
          files: ./be/.github/workflows/wizard/spec.xml
          search-text: WORKDIR_PLACEHOLDER
          replacement-text: ${{ github.workspace }}

      - name: Install InstallBuilder
        run: |
            curl -L -o installbuilder-${{ matrix.config.installer.ver }} https://releases.installbuilder.com/installbuilder/installbuilder-professional-24.11.1-${{ matrix.config.installer.ver }}
            dir
            & './installbuilder-${{ matrix.config.installer.ver }} --mode unattended'
            dir "c:/Program Files"
        
      - name: Build installer
        run: |
            & "${{ matrix.config.installer.exec }} build spec.xml ${{ matrix.config.installer.target }}"
        working-directory: ./be/.github/workflows/wizard

      - name: Upload BE artifacts
        uses: actions/upload-artifact@v4
        with:
            name: bitcredit-0.5-${{ matrix.config.installer.ver }}
            path: ./be/.github/workflows/wizard/bitcredit-0.5-${{ matrix.config.installer.ver }}
  
